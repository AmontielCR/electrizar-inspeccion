<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA básico -->
    <title>Electrizar — Informes Técnicos</title>
    <meta name="description" content="Sistema de informes de verificación eléctrica y mantenimiento de Electrizar Electromecánica SRL" />
    <meta name="theme-color" content="#F5A800" />

    <!-- iOS — hace que funcione como app nativa al instalarla -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Electrizar" />

    <!-- Ícono para iOS (Safari "Añadir a pantalla de inicio") -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Favicon estándar -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Manifest (Android + estándar PWA) — generado por vite-plugin-pwa -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Evita que iOS muestre la barra de URL al hacer scroll -->
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
